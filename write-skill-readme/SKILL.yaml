name: write-skill-readme
version: 1.0.0
description: 为 Agent Skills 编写符合"Prompt优先、小白友好、场景化组织"风格的 README.md 用户使用指南。分析技能的 YAML frontmatter、SKILL.md、config.yaml、scripts/ 等文件（仅读取，不修改），生成包含"快速开始（常规Prompt：skill+输入+输出）+ 进阶Prompt（参数约束，可选）+ 设计理念 + 使用示例 + 常见问题"的 README.md。⚠️ 安全限制：仅生成/新增 README.md，永远不修改目标技能的任何现有文件（SKILL.md/SKILL.yaml/config.yaml/scripts/references）。用于用户要求"写skill readme/生成技能文档/写用户指南/更新README"。
author: Bensz Conan
metadata:
  short-description: 为技能生成符合最佳实践的README.md
  keywords:
    - write-skill-readme
    - README生成
    - 技能文档
    - 用户指南
    - Prompt模板
    - 技能开发
  category: documentation
  subcategory: readme-generation
  platforms:
    - claude-code
    - codex
  dependencies: []
  outputs:
    - README.md
  config-files: []
