template:
  name: modern-light-web-tech-tutorial
  aspect_ratio: "16:9"
  default_pages: 10
  language: zh
  default_theme: light
  default_logo: assets/xiemuhou-wordmark-logo.svg

style:
  tone: tutorial
  personality: clear, modern, fresh, technical, teaching, structured
  background: light_gradient
  background_colors:
    - "#F7F9FC"
    - "#FFFFFF"
    - "#F6F9FF"
  primary_color: "#006C32"
  alternate_primary_color: "#2563EB"
  secondary_color: "#599F7A"
  accent_color: "#38BDF8"
  progress_gradient:
    - "#60A5FA"
    - "#34D399"
  danger_color: "#EF4444"
  text_color: "#111827"
  body_text_color: "#1F2937"
  muted_text_color: "#6B7280"
  surface_color: "#F8FAFC"
  panel_color: "#FFFFFF"
  heading_gradient:
    - "#0F172A"
    - "#1E3A8A"
    - "#006C32"
  code_background: "#0B1220"
  code_background_alt: "#111827"
  code_text_color: "#E2E8F0"
  border_color: "#DDE6F3"
  font_stack:
    - PingFang SC
    - Microsoft YaHei
    - 思源黑体
    - Aptos
    - Arial
  code_font_stack:
    - Consolas
    - Cascadia Code
    - JetBrains Mono
    - Courier New

layout:
  content_max_width_ratio: 0.88
  page_padding_px: 72
  max_bullets_per_slide: 6
  max_columns: 4
  title_max_chars: 24
  body_max_chars_per_bullet: 24
  min_body_font_pt: 16
  max_code_lines_per_slide: 12
  preferred_slide_types:
    - cover
    - learning-goals
    - map
    - concept
    - step-by-step
    - code
    - example
    - comparison
    - pitfalls
    - checklist
    - recap
  required_components:
    - fixed_bottom_left_logo
    - subtle_progress_bar
    - gradient_heading
    - gradient_bullets
    - pill_tags
    - dark_code_block

brand:
  default_text: xmh
  alternatives:
    - xiemuhou
    - 谢幕后
  logo_path: assets/xiemuhou-wordmark-logo.svg
  placement_mode: background_brand_layer
  position: bottom_left
  width_ratio: 0.12
  height_ratio: auto
  x_inch: 0
  y_inch: 6.62
  same_size_on_all_slides: true
  allow_cover_override: false
  safe_margin_px: 32
  reserved_bottom_area_px: 96
  draw_order: behind_content
  lock_strategy:
    preferred:
      - slide_master
      - merged_background_image
      - background_layer
    fallback: draw_logo_before_content_with_fixed_coordinates
  constraints:
    - no_manual_resize_per_slide
    - no_overlap_with_body
    - no_overlap_with_page_number
    - no_overlap_with_cards_tables_code

teaching:
  default_audience: beginner
  required_sections:
    - why
    - learning_map
    - concept
    - steps
    - code_or_example
    - pitfalls
    - checklist
    - recap
  avoid:
    - long_paragraphs
    - decorative_only_pages
    - tiny_text
    - low_resolution_images
    - flashy_animations
    - unverified_sources
    - traditional_business_style
    - heavy_dark_backgrounds

validation:
  check:
    - slide_count_matches_request
    - titles_are_readable
    - no_text_overflow
    - no_element_overlap
    - code_blocks_are_readable
    - colors_have_enough_contrast
    - logo_is_visible_but_not_distracting
    - logo_size_is_consistent_on_all_slides
    - logo_is_in_background_brand_layer
    - content_respects_logo_safe_area
    - slide_looks_like_technical_course_not_marketing
