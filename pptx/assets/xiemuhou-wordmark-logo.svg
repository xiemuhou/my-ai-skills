<svg xmlns="http://www.w3.org/2000/svg" width="200" height="86" viewBox="50 0 200 86" role="img" aria-label="xiemuhou blog logo">
  <defs>
    <linearGradient id="xiemuhouBrightWord" x1="36" y1="14" x2="260" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.45" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="xiemuhouSub" x1="72" y1="67" x2="228" y2="67" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="wordSoftGlow" x="-12%" y="-18%" width="124%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#38BDF8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#wordSoftGlow)">
    <text x="150" y="48"
      font-family="STXingkai, Xingkai SC, KaiTi, Kaiti SC, FZKai-Z03S, cursive"
      font-size="50"
      font-weight="500"
      letter-spacing="0"
      text-anchor="middle"
      fill="url(#xiemuhouBrightWord)">xiemuhou</text>
  </g>

  <text x="150" y="67"
    font-family="Aptos, Segoe UI, Arial, sans-serif"
    font-size="13.5"
    font-weight="750"
    letter-spacing="1.15"
    text-anchor="middle"
    fill="url(#xiemuhouSub)">blog.xmhweb.cn</text>
</svg>
